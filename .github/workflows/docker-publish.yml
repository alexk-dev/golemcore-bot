name: CI & Docker Publish

on:
  push:
    branches: ['**']
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:
    # Only users with write access (contributors/collaborators) can trigger manually.
    # GitHub enforces this by default for workflow_dispatch.

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  PLUGIN_API_REPO_REF: 67cd0d10a997f494dcaf4686438e5c6bcfc8ac65

jobs:
  test:
    name: Build & Test (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}

    strategy:
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Checkout plugin APIs
        uses: actions/checkout@v6
        with:
          repository: alexk-dev/golemcore-plugins
          ref: ${{ env.PLUGIN_API_REPO_REF }}
          path: golemcore-plugins

      - name: Install plugin API artifacts
        run: mvn -B -ntp -Djgitver.skip=true -f golemcore-plugins/pom.xml -pl extension-api,runtime-api -am install -DskipTests

      - name: Build and run tests
        run: ./mvnw clean verify -DskipGitHooks=true

      - name: Check Codecov token availability
        if: always() && matrix.arch == 'amd64'
        id: codecov-token
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        run: |
          if [[ -n "${CODECOV_TOKEN}" ]]; then
            echo "available=true" >> "${GITHUB_OUTPUT}"
          else
            echo "available=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Upload coverage to Codecov
        if: always() && matrix.arch == 'amd64' && steps.codecov-token.outputs.available == 'true'
        uses: codecov/codecov-action@v6
        with:
          files: ./target/site/jacoco/jacoco.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
          handle_no_reports_found: true

      - name: Skip Codecov upload (missing CODECOV_TOKEN)
        if: always() && matrix.arch == 'amd64' && steps.codecov-token.outputs.available != 'true'
        run: echo "Skipping Codecov upload because CODECOV_TOKEN is unavailable for this event."

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Checkout plugin APIs
        uses: actions/checkout@v6
        with:
          repository: alexk-dev/golemcore-plugins
          ref: ${{ env.PLUGIN_API_REPO_REF }}
          path: golemcore-plugins

      - name: Install plugin API artifacts
        run: mvn -B -ntp -Djgitver.skip=true -f golemcore-plugins/pom.xml -pl extension-api,runtime-api -am install -DskipTests

      - name: Run integration test suite
        run: >
          ./mvnw -B -ntp test
          -Dtest=DashboardSecurityIntegrationTest,RuntimeSettingsHttpIntegrationTest,HiveSdlcDefaultSettingsIntegrationTest
          -DskipGitHooks=true

  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check changed files English-only policy
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_BASE_REF: ${{ github.base_ref }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_EVENT_BEFORE: ${{ github.event.before }}
        run: python3 .github/scripts/check-only-english.py

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Checkout plugin APIs
        uses: actions/checkout@v6
        with:
          repository: alexk-dev/golemcore-plugins
          ref: ${{ env.PLUGIN_API_REPO_REF }}
          path: golemcore-plugins

      - name: Install plugin API artifacts
        run: mvn -B -ntp -Djgitver.skip=true -f golemcore-plugins/pom.xml -pl extension-api,runtime-api -am install -DskipTests

      - name: Check formatting
        run: ./mvnw formatter:validate -DskipGitHooks=true

      - name: Run PMD
        run: ./mvnw -P strict pmd:check -DskipGitHooks=true

      - name: Run SpotBugs
        run: ./mvnw -P strict compile spotbugs:check -DskipGitHooks=true

      - name: Generate Javadoc
        run: ./mvnw -B -ntp javadoc:javadoc -DskipGitHooks=true

      - name: Upload PMD report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: pmd-report
          path: target/pmd.xml

      - name: Upload SpotBugs report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: spotbugs-report
          path: target/spotbugsXml.xml

  sonar:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    needs: [test, integration-tests]

    steps:
      - name: Check Sonar token availability
        id: sonar-token
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          if [[ -n "${SONAR_TOKEN}" ]]; then
            echo "available=true" >> "${GITHUB_OUTPUT}"
          else
            echo "available=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Checkout
        if: steps.sonar-token.outputs.available == 'true'
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # full history for accurate blame

      - name: Set up JDK 25
        if: steps.sonar-token.outputs.available == 'true'
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Checkout plugin APIs
        if: steps.sonar-token.outputs.available == 'true'
        uses: actions/checkout@v6
        with:
          repository: alexk-dev/golemcore-plugins
          ref: ${{ env.PLUGIN_API_REPO_REF }}
          path: golemcore-plugins

      - name: Install plugin API artifacts
        if: steps.sonar-token.outputs.available == 'true'
        run: mvn -B -ntp -Djgitver.skip=true -f golemcore-plugins/pom.xml -pl extension-api,runtime-api -am install -DskipTests

      - name: Build, test and analyze
        if: steps.sonar-token.outputs.available == 'true'
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: >
          ./mvnw clean verify sonar:sonar
          -DskipGitHooks=true

      - name: Skip SonarCloud Analysis (missing SONAR_TOKEN)
        if: steps.sonar-token.outputs.available != 'true'
        run: echo "Skipping SonarCloud Analysis because SONAR_TOKEN is unavailable for this event."

  # ── Build per-arch app images via Jib ────────────────────────────────────
  build-app-images:
    name: App (${{ matrix.arch }})
    runs-on: ubuntu-latest
    needs: [test, integration-tests, code-quality]
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'

    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        arch: [amd64, arm64]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Checkout plugin APIs
        uses: actions/checkout@v6
        with:
          repository: alexk-dev/golemcore-plugins
          ref: ${{ env.PLUGIN_API_REPO_REF }}
          path: golemcore-plugins

      - name: Install plugin API artifacts
        run: mvn -B -ntp -Djgitver.skip=true -f golemcore-plugins/pom.xml -pl extension-api,runtime-api -am install -DskipTests

      - name: Determine image tags
        id: tags
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          APP_IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          ARCH="${{ matrix.arch }}"

          echo "sha-arch-tag=${SHORT_SHA}-${ARCH}" >> $GITHUB_OUTPUT
          echo "app-image=${APP_IMAGE}:${SHORT_SHA}-${ARCH}" >> $GITHUB_OUTPUT

          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${{ github.ref_name }}"
            VERSION="${VERSION#v}"
            echo "jib-tags=latest-${ARCH},${VERSION}-${ARCH}" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "jib-tags=latest-${ARCH}" >> $GITHUB_OUTPUT
          else
            echo "jib-tags=dev-latest-${ARCH}" >> $GITHUB_OUTPUT
          fi

      - name: Build and push app image (${{ matrix.arch }})
        run: |
          ./mvnw prepare-package jib:build \
            -DskipTests \
            -DskipGitHooks=true \
            -Djib.from.image=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-base:latest \
            -Djib.platform.arch=${{ matrix.arch }} \
            -Djib.target.image=${{ steps.tags.outputs.app-image }} \
            -Djib.to.tags=${{ steps.tags.outputs.jib-tags }} \
            -Djib.to.auth.username=${{ github.actor }} \
            -Djib.to.auth.password=${{ secrets.GITHUB_TOKEN }}

  # ── Stitch multiarch manifest ────────────────────────────────────────────
  create-manifest:
    name: Multiarch Manifest
    runs-on: ubuntu-latest
    needs: [build-app-images]
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'

    permissions:
      contents: read
      packages: write

    steps:
      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push multiarch manifest
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"

          # SHA-tagged manifest
          docker manifest create "${IMAGE}:${SHORT_SHA}" \
            "${IMAGE}:${SHORT_SHA}-amd64" \
            "${IMAGE}:${SHORT_SHA}-arm64"
          docker manifest push "${IMAGE}:${SHORT_SHA}"

          # Version manifest (tag push)
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${{ github.ref_name }}"
            VERSION="${VERSION#v}"
            docker manifest create "${IMAGE}:${VERSION}" \
              "${IMAGE}:${VERSION}-amd64" \
              "${IMAGE}:${VERSION}-arm64"
            docker manifest push "${IMAGE}:${VERSION}"

            docker manifest create "${IMAGE}:latest" \
              "${IMAGE}:latest-amd64" \
              "${IMAGE}:latest-arm64"
            docker manifest push "${IMAGE}:latest"
          elif [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            docker manifest create "${IMAGE}:latest" \
              "${IMAGE}:latest-amd64" \
              "${IMAGE}:latest-arm64"
            docker manifest push "${IMAGE}:latest"
          else
            docker manifest create "${IMAGE}:dev-latest" \
              "${IMAGE}:dev-latest-amd64" \
              "${IMAGE}:dev-latest-arm64"
            docker manifest push "${IMAGE}:dev-latest"
          fi

      - name: Verify published manifest tags
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"

          verify_manifest() {
            local reference="$1"
            local raw

            raw="$(docker buildx imagetools inspect "${reference}" --raw)"

            if ! grep -Eq '"mediaType"[[:space:]]*:[[:space:]]*"(application/vnd.docker.distribution.manifest.list.v2\+json|application/vnd.oci.image.index.v1\+json)"' <<< "${raw}"; then
              echo "Expected a multi-arch manifest list for ${reference}, but found:"
              echo "${raw}"
              exit 1
            fi

            if ! grep -Eq '"architecture"[[:space:]]*:[[:space:]]*"amd64"' <<< "${raw}"; then
              echo "Missing linux/amd64 entry in ${reference}"
              echo "${raw}"
              exit 1
            fi

            if ! grep -Eq '"architecture"[[:space:]]*:[[:space:]]*"arm64"' <<< "${raw}"; then
              echo "Missing linux/arm64 entry in ${reference}"
              echo "${raw}"
              exit 1
            fi
          }

          verify_manifest "${IMAGE}:${SHORT_SHA}"

          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${{ github.ref_name }}"
            VERSION="${VERSION#v}"
            verify_manifest "${IMAGE}:${VERSION}"
            verify_manifest "${IMAGE}:latest"
          elif [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            verify_manifest "${IMAGE}:latest"
          else
            verify_manifest "${IMAGE}:dev-latest"
          fi

      - name: Job Summary
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"

          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${{ github.ref_name }}"
            VERSION="${VERSION#v}"
            PRIMARY_TAG="${VERSION}"
            TAGS="\`${VERSION}\`, \`latest\`, \`${SHORT_SHA}\`"
          elif [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            PRIMARY_TAG="latest"
            TAGS="\`latest\`, \`${SHORT_SHA}\`"
          else
            PRIMARY_TAG="dev-latest"
            TAGS="\`dev-latest\`, \`${SHORT_SHA}\`"
          fi

          echo "## Multiarch Docker Image Published" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Image** | \`${IMAGE}:${PRIMARY_TAG}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Tags** | ${TAGS} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Architectures** | \`amd64\`, \`arm64\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Base image** | \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-base:latest\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Branch** | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | \`${SHORT_SHA}\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Pull command" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "docker pull ${IMAGE}:${PRIMARY_TAG}" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
