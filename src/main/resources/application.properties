spring.application.name=${SPRING_APPLICATION_NAME:golemcore-bot}

# ===== BOT PATHS =====
# Primary storage workspace (sessions, memory, preferences, usage, skills)
bot.storage.local.base-path=${STORAGE_PATH:${user.home}/.golemcore/workspace}
bot.storage.directories.sessions=${BOT_STORAGE_DIRECTORIES_SESSIONS:sessions}
bot.storage.directories.memory=${BOT_STORAGE_DIRECTORIES_MEMORY:memory}
bot.storage.directories.skills=${BOT_STORAGE_DIRECTORIES_SKILLS:skills}
bot.memory.directory=${BOT_MEMORY_DIRECTORY:memory}
bot.skills.directory=${BOT_SKILLS_DIRECTORY:skills}
bot.skills.workspace-path=${BOT_SKILLS_WORKSPACE_PATH:workspace/skills}
bot.skills.builtin-path=${BOT_SKILLS_BUILTIN_PATH:classpath:skills/}
bot.skills.marketplace-enabled=${BOT_SKILLS_MARKETPLACE_ENABLED:true}
bot.skills.marketplace-repository-directory=${BOT_SKILLS_MARKETPLACE_REPOSITORY_DIRECTORY:}
bot.skills.marketplace-sandbox-path=${BOT_SKILLS_MARKETPLACE_SANDBOX_PATH:}
bot.skills.marketplace-repository-url=${BOT_SKILLS_MARKETPLACE_REPOSITORY_URL:https://github.com/alexk-dev/golemcore-skills}
bot.skills.marketplace-branch=${BOT_SKILLS_MARKETPLACE_BRANCH:main}
bot.skills.marketplace-api-base-url=${BOT_SKILLS_MARKETPLACE_API_BASE_URL:https://api.github.com}
bot.skills.marketplace-raw-base-url=${BOT_SKILLS_MARKETPLACE_RAW_BASE_URL:https://raw.githubusercontent.com}
bot.skills.marketplace-remote-cache-ttl=${BOT_SKILLS_MARKETPLACE_REMOTE_CACHE_TTL:PT5M}

# Sandboxed workspaces for tool execution
bot.tools.filesystem.workspace=${TOOLS_WORKSPACE:${user.home}/.golemcore/sandbox}
bot.tools.shell.workspace=${TOOLS_WORKSPACE:${user.home}/.golemcore/sandbox}

# ===== DASHBOARD =====
bot.dashboard.enabled=${DASHBOARD_ENABLED:true}
bot.dashboard.admin-password=${BOT_DASHBOARD_ADMIN_PASSWORD:}
bot.dashboard.logs.enabled=${BOT_DASHBOARD_LOGS_ENABLED:true}
bot.dashboard.logs.max-entries=${BOT_DASHBOARD_LOGS_MAX_ENTRIES:10000}
bot.dashboard.logs.default-page-size=${BOT_DASHBOARD_LOGS_DEFAULT_PAGE_SIZE:200}
bot.dashboard.logs.max-page-size=${BOT_DASHBOARD_LOGS_MAX_PAGE_SIZE:1000}
bot.dashboard.logs.max-message-chars=${BOT_DASHBOARD_LOGS_MAX_MESSAGE_CHARS:8000}
bot.dashboard.logs.max-exception-chars=${BOT_DASHBOARD_LOGS_MAX_EXCEPTION_CHARS:16000}

# ===== SELF-UPDATE =====
bot.update.enabled=${BOT_UPDATE_ENABLED:true}
bot.update.updates-path=${UPDATE_PATH:${bot.storage.local.base-path}/updates}
bot.update.max-kept-versions=${BOT_UPDATE_MAX_KEPT_VERSIONS:3}
bot.update.check-interval=${BOT_UPDATE_CHECK_INTERVAL:PT1H}

# ===== PLUGINS =====
bot.plugins.enabled=${BOT_PLUGINS_ENABLED:true}
bot.plugins.auto-start=${BOT_PLUGINS_AUTO_START:true}
bot.plugins.auto-reload=${BOT_PLUGINS_AUTO_RELOAD:true}
bot.plugins.directory=${BOT_PLUGINS_DIRECTORY:${bot.storage.local.base-path}/plugins}
bot.plugins.poll-interval=${BOT_PLUGINS_POLL_INTERVAL:PT5S}
bot.plugins.marketplace.repository-directory=${BOT_PLUGINS_MARKETPLACE_REPOSITORY_DIRECTORY:}
bot.plugins.marketplace.repository-url=${BOT_PLUGINS_MARKETPLACE_REPOSITORY_URL:https://github.com/alexk-dev/golemcore-plugins}
bot.plugins.marketplace.branch=${BOT_PLUGINS_MARKETPLACE_BRANCH:main}
bot.plugins.marketplace.api-base-url=${BOT_PLUGINS_MARKETPLACE_API_BASE_URL:https://api.github.com}
bot.plugins.marketplace.raw-base-url=${BOT_PLUGINS_MARKETPLACE_RAW_BASE_URL:https://raw.githubusercontent.com}
bot.plugins.marketplace.remote-cache-ttl=${BOT_PLUGINS_MARKETPLACE_REMOTE_CACHE_TTL:PT5M}

# ===== WEBHOOKS =====
bot.webhooks.delivery-history-max-entries=${BOT_WEBHOOKS_DELIVERY_HISTORY_MAX_ENTRIES:500}

# ===== HIVE =====
bot.hive.dashboard-base-url=${BOT_HIVE_DASHBOARD_BASE_URL:}
bot.hive.sso-enabled=${BOT_HIVE_SSO_ENABLED:true}
